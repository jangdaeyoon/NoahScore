name: Build NoahScore APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 1. 코드 가져오기
      uses: actions/checkout@v4
    - name: 2. Flutter 환경 세팅
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        flutter-version: '3.19.0'
    - name: 3. 앱 생성 및 코드 이식
      run: |
        flutter create noah_score_app
        # 주의: 깃허브 저장소 루트에서 Skills/NoahScore 안의 main.dart를 복사해옵니다.
        cp Skills/NoahScore/main.dart noah_score_app/lib/main.dart
    - name: 4. 필수 라이브러리 혈관 주입 (http, collection)
      run: |
        cd noah_score_app
        flutter pub add http collection
        flutter pub get
    - name: 5. 안드로이드 인터넷 권한 주입
      run: |
        sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET"/>' noah_score_app/android/app/src/main/AndroidManifest.xml
    - name: 6. APK 최종 컴파일 (Gemini API 키 주입)
      run: |
        cd noah_score_app
        # 주인님의 클라우드 지능 키를 빌드할 때 밀어 넣습니다!
        flutter build apk --release --dart-define=GEMINI_API_KEY=${{ secrets.GOOGLE_API_KEY }}
    - name: 7. 결과물 업로드
      uses: actions/upload-artifact@v4
      with:
        name: NoahScore-App
        path: noah_score_app/build/app/outputs/flutter-apk/app-release.apk
