name: Build NoahScore APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 1. 코드 가져오기
      uses: actions/checkout@v4
    - name: 2. Flutter 환경 세팅
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        flutter-version: '3.19.0'
    - name: 3. 앱 생성 및 코드 이식
      run: |
        flutter create noah_score_app
        cp Skills/NoahScore/main.dart noah_score_app/lib/main.dart
    - name: 4. 필수 라이브러리 주입 (webview_flutter 추가)
      run: |
        cd noah_score_app
        # 여기에 webview_flutter를 추가했습니다!
        flutter pub add http collection intl firebase_core webview_flutter
        flutter pub get
    - name: 5. 안드로이드 필수 설정 (인터넷, SDK 21, 코틀린 1.8.22 상향)
      run: |
        sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET"/>' noah_score_app/android/app/src/main/AndroidManifest.xml
        sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' noah_score_app/android/app/build.gradle
        sed -i 's/1.7.10/1.8.22/g' noah_score_app/android/settings.gradle || true
        sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = '\''1.8.22'\''/g' noah_score_app/android/build.gradle || true
    - name: 6. APK 최종 컴파일 (Gemini API 키 주입)
      run: |
        cd noah_score_app
        flutter build apk --release --dart-define=GEMINI_API_KEY=${{ secrets.GOOGLE_API_KEY }}
    - name: 7. 결과물 업로드
      uses: actions/upload-artifact@v4
      with:
        name: NoahScore-App
        path: noah_score_app/build/app/outputs/flutter-apk/app-release.apk
